<svg width="1200" height="980" viewBox="0 0 1200 980" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SheetWeave 决策流程图</title>
  <desc id="desc">决策流程图：总览图检测、自动标号匹配、人工/VLM 映射、重叠匹配回退、桥接恢复、分组诊断和矢量 PDF 导出。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FCF8"/>
      <stop offset="1" stop-color="#E6F4EE"/>
    </linearGradient>
    <linearGradient id="dark" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0B1720"/>
      <stop offset="1" stop-color="#143E36"/>
    </linearGradient>
    <filter id="shadow" x="-14%" y="-20%" width="128%" height="142%">
      <feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#061014" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7.4" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M1.5 1.5L7.4 4.5L1.5 7.5" stroke="#1F7A6D" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1200" height="980" rx="34" fill="url(#bg)"/>
  <path d="M0 820C170 760 318 804 472 754C636 700 766 612 960 660C1074 688 1146 660 1200 628V980H0V820Z" fill="#1F7A6D" fill-opacity="0.07"/>

  <text x="600" y="58" text-anchor="middle" fill="#0B1720" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="700">SheetWeave 决策流程图</text>
  <text x="600" y="90" text-anchor="middle" fill="#49605A" font-family="Segoe UI, Arial, sans-serif" font-size="18">优先使用总览图标号求解布局。当总览图无法解决时，平滑回退到其他方案。</text>

  <g filter="url(#shadow)" font-family="Segoe UI, Arial, sans-serif">
    <rect x="480" y="120" width="240" height="64" rx="22" fill="#FFFFFF" stroke="#D3E8DF"/>
    <text x="600" y="159" text-anchor="middle" fill="#0B1720" font-size="21" font-weight="700">图纸 PDF</text>

    <rect x="430" y="222" width="340" height="78" rx="24" fill="#FFFFFF" stroke="#D3E8DF"/>
    <text x="600" y="255" text-anchor="middle" fill="#0B1720" font-size="20" font-weight="700">渲染预览和提取文字</text>
    <text x="600" y="280" text-anchor="middle" fill="#49605A" font-size="15">低分辨率图像 + 提取的标号</text>

    <rect x="430" y="340" width="340" height="82" rx="24" fill="#FFFFFF" stroke="#1F7A6D" stroke-width="2"/>
    <text x="600" y="374" text-anchor="middle" fill="#0B1720" font-size="20" font-weight="700">是否有总览/索引页？</text>
    <text x="600" y="399" text-anchor="middle" fill="#49605A" font-size="15">通常是首页或末页</text>

    <rect x="430" y="466" width="340" height="86" rx="24" fill="#FFFFFF" stroke="#1F7A6D" stroke-width="2"/>
    <text x="600" y="501" text-anchor="middle" fill="#0B1720" font-size="20" font-weight="700">标号能否解决布局？</text>
    <text x="600" y="527" text-anchor="middle" fill="#49605A" font-size="15">机器可读、人眼可见、或无标号</text>

    <rect x="70" y="604" width="290" height="94" rx="24" fill="#FFFFFF" stroke="#D3E8DF"/>
    <text x="215" y="639" text-anchor="middle" fill="#0B1720" font-size="20" font-weight="700">人工/VLM 生成布局 JSON</text>
    <text x="215" y="665" text-anchor="middle" fill="#49605A" font-size="15">标号可见但代码无法提取</text>

    <rect x="455" y="604" width="290" height="94" rx="24" fill="#FFFFFF" stroke="#D3E8DF"/>
    <text x="600" y="639" text-anchor="middle" fill="#0B1720" font-size="20" font-weight="700">自动标号映射</text>
    <text x="600" y="665" text-anchor="middle" fill="#49605A" font-size="15">通过 PDF 文字提取图纸编号</text>

    <rect x="840" y="604" width="290" height="94" rx="24" fill="#FFFFFF" stroke="#D3E8DF"/>
    <text x="985" y="639" text-anchor="middle" fill="#0B1720" font-size="20" font-weight="700">重叠区域匹配</text>
    <text x="985" y="665" text-anchor="middle" fill="#49605A" font-size="15">无总览图、无标号、或匹配不足</text>

    <rect x="430" y="746" width="340" height="78" rx="24" fill="#FFFFFF" stroke="#1F7A6D" stroke-width="2"/>
    <text x="600" y="779" text-anchor="middle" fill="#0B1720" font-size="20" font-weight="700">构建关系图并求解位置</text>
    <text x="600" y="804" text-anchor="middle" fill="#49605A" font-size="15">选中的边转化为页面变换</text>

    <rect x="430" y="862" width="340" height="78" rx="24" fill="#FFFFFF" stroke="#1F7A6D" stroke-width="2"/>
    <text x="600" y="895" text-anchor="middle" fill="#0B1720" font-size="20" font-weight="700">是否为单个连通组件？</text>
    <text x="600" y="920" text-anchor="middle" fill="#49605A" font-size="15">否则保留诊断信息</text>

    <rect x="80" y="858" width="270" height="86" rx="24" fill="#FFFFFF" stroke="#D3E8DF"/>
    <text x="215" y="892" text-anchor="middle" fill="#0B1720" font-size="20" font-weight="700">桥接恢复</text>
    <text x="215" y="918" text-anchor="middle" fill="#49605A" font-size="15">定向高 DPI 检查</text>

    <rect x="850" y="858" width="270" height="86" rx="24" fill="url(#dark)"/>
    <text x="985" y="892" text-anchor="middle" fill="#F8FCF8" font-size="20" font-weight="700">矢量合成 PDF</text>
    <text x="985" y="918" text-anchor="middle" fill="#FFE2A6" font-size="15">原始页面嵌入 TikZ 画布</text>

    <rect x="80" y="746" width="270" height="78" rx="24" fill="#FFF9EA" stroke="#F1C376" stroke-width="2"/>
    <text x="215" y="779" text-anchor="middle" fill="#0B1720" font-size="20" font-weight="700">分组输出和诊断</text>
    <text x="215" y="804" text-anchor="middle" fill="#49605A" font-size="15">检查未解决的组件</text>
  </g>

  <g stroke="#1F7A6D" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)">
    <path d="M600 184V211"/>
    <path d="M600 300V329"/>
    <path d="M600 422V455"/>
    <path d="M520 552C432 570 326 578 226 596"/>
    <path d="M600 552V592"/>
    <path d="M680 552C770 570 878 578 974 596"/>
    <path d="M215 698C215 728 382 736 520 746"/>
    <path d="M600 698V735"/>
    <path d="M985 698C985 728 820 736 680 746"/>
    <path d="M600 824V851"/>
    <path d="M770 901H839"/>
    <path d="M430 901H361"/>
    <path d="M215 858V835"/>
    <path d="M350 872C390 842 414 820 430 804"/>
  </g>

  <path d="M770 381C894 394 985 460 985 592" stroke="#1F7A6D" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">
    <rect x="618" y="436" width="42" height="24" rx="12" fill="#1F7A6D"/>
    <text x="639" y="453" text-anchor="middle" fill="#FFFFFF">是</text>
    <rect x="834" y="410" width="96" height="25" rx="12.5" fill="#F1C376"/>
    <text x="882" y="428" text-anchor="middle" fill="#0B1720">无总览图</text>
    <rect x="290" y="570" width="86" height="25" rx="12.5" fill="#F1C376"/>
    <text x="333" y="588" text-anchor="middle" fill="#0B1720">人眼可见</text>
    <rect x="537" y="570" width="126" height="25" rx="12.5" fill="#1F7A6D"/>
    <text x="600" y="588" text-anchor="middle" fill="#FFFFFF">机器可读</text>
    <rect x="800" y="570" width="105" height="25" rx="12.5" fill="#F1C376"/>
    <text x="852" y="588" text-anchor="middle" fill="#0B1720">无标号</text>

    <rect x="786" y="876" width="43" height="25" rx="12.5" fill="#1F7A6D"/>
    <text x="807" y="894" text-anchor="middle" fill="#FFFFFF">是</text>
    <rect x="371" y="876" width="43" height="25" rx="12.5" fill="#F1C376"/>
    <text x="392" y="894" text-anchor="middle" fill="#0B1720">否</text>
    <rect x="348" y="824" width="72" height="25" rx="12.5" fill="#1F7A6D"/>
    <text x="384" y="842" text-anchor="middle" fill="#FFFFFF">重新求解</text>
    <rect x="232" y="832" width="72" height="25" rx="12.5" fill="#F1C376"/>
    <text x="268" y="850" text-anchor="middle" fill="#0B1720">仍断开</text>
  </g>
</svg>
