<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SheetWeave 工作流概览</title>
  <desc id="desc">五步流程图：分块图纸 PDF 经过布局恢复、结果检查、矢量 PDF 导出。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FCF8"/>
      <stop offset="1" stop-color="#E5F4EE"/>
    </linearGradient>
    <linearGradient id="dark" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0B1720"/>
      <stop offset="1" stop-color="#143E36"/>
    </linearGradient>
    <filter id="shadow" x="-18%" y="-24%" width="136%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="13" flood-color="#061014" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M1.5 1.5L7.5 4.5L1.5 7.5" stroke="#1F7A6D" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1200" height="520" rx="34" fill="url(#bg)"/>
  <path d="M0 410C160 354 300 392 430 358C608 310 744 238 932 286C1042 314 1122 288 1200 240V520H0V410Z" fill="#1F7A6D" fill-opacity="0.08"/>

  <text x="600" y="58" text-anchor="middle" fill="#0B1720" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="700">SheetWeave 快速一览</text>
  <text x="600" y="90" text-anchor="middle" fill="#49605A" font-family="Segoe UI, Arial, sans-serif" font-size="18">低成本恢复布局，检查合并结果，最终以原始 PDF 页面完整导出矢量文件。</text>

  <g stroke="#1F7A6D" stroke-width="3.2" stroke-linecap="round" marker-end="url(#arrow)">
    <path d="M246 258H286"/>
    <path d="M476 258H516"/>
    <path d="M706 258H746"/>
    <path d="M936 258H976"/>
  </g>

  <g filter="url(#shadow)" font-family="Segoe UI, Arial, sans-serif">
    <rect x="56" y="150" width="190" height="216" rx="22" fill="#FFFFFF" stroke="#D3E8DF"/>
    <text x="151" y="190" text-anchor="middle" fill="#0B1720" font-size="21" font-weight="700">PDF 输入</text>
    <text x="151" y="218" text-anchor="middle" fill="#49605A" font-size="15">分块图纸页</text>
    <g transform="translate(93 246)">
      <rect x="0" y="0" width="56" height="42" rx="7" fill="#F8FCF8" stroke="#1F7A6D" stroke-width="2"/>
      <rect x="64" y="0" width="56" height="42" rx="7" fill="#F8FCF8" stroke="#1F7A6D" stroke-width="2"/>
      <rect x="32" y="52" width="56" height="42" rx="7" fill="#F8FCF8" stroke="#1F7A6D" stroke-width="2"/>
      <path d="M11 15H45M11 27H38M75 15H109M75 27H101M43 67H77M43 79H70" stroke="#1F7A6D" stroke-width="2.6" stroke-linecap="round" opacity="0.65"/>
    </g>

    <rect x="286" y="150" width="190" height="216" rx="22" fill="#FFFFFF" stroke="#D3E8DF"/>
    <text x="381" y="190" text-anchor="middle" fill="#0B1720" font-size="21" font-weight="700">恢复布局</text>
    <text x="381" y="218" text-anchor="middle" fill="#49605A" font-size="15">低DPI预览图</text>
    <g transform="translate(326 248)" stroke="#1F7A6D" stroke-width="3" stroke-linecap="round">
      <rect x="0" y="0" width="110" height="88" rx="10" fill="#F8FCF8" stroke="#1F7A6D"/>
      <path d="M18 24H92M18 44H66M18 64H88"/>
      <circle cx="92" cy="24" r="9" fill="#F1C376" stroke="none"/>
      <circle cx="66" cy="44" r="9" fill="#F1C376" stroke="none"/>
      <circle cx="88" cy="64" r="9" fill="#F1C376" stroke="none"/>
    </g>

    <rect x="516" y="150" width="190" height="216" rx="22" fill="#FFFFFF" stroke="#D3E8DF"/>
    <text x="611" y="190" text-anchor="middle" fill="#0B1720" font-size="21" font-weight="700">选择路线</text>
    <text x="611" y="218" text-anchor="middle" fill="#49605A" font-size="15">总览图或重叠</text>
    <g transform="translate(550 238)">
      <rect x="0" y="0" width="122" height="34" rx="17" fill="#EAF6F0"/>
      <text x="61" y="23" text-anchor="middle" fill="#1F7A6D" font-size="15" font-weight="700">标号</text>
      <rect x="0" y="44" width="122" height="34" rx="17" fill="#FFF2D2"/>
      <text x="61" y="67" text-anchor="middle" fill="#0B1720" font-size="15" font-weight="700">VLM JSON</text>
      <rect x="0" y="88" width="122" height="34" rx="17" fill="#EAF6F0"/>
      <text x="61" y="111" text-anchor="middle" fill="#1F7A6D" font-size="15" font-weight="700">重叠</text>
    </g>

    <rect x="746" y="150" width="190" height="216" rx="22" fill="#FFFFFF" stroke="#D3E8DF"/>
    <text x="841" y="190" text-anchor="middle" fill="#0B1720" font-size="21" font-weight="700">检查结果</text>
    <text x="841" y="218" text-anchor="middle" fill="#49605A" font-size="15">摘要和预览</text>
    <g transform="translate(786 248)">
      <rect x="0" y="0" width="110" height="88" rx="10" fill="#F8FCF8" stroke="#1F7A6D" stroke-width="3"/>
      <path d="M18 22H78M18 42H92M18 62H54" stroke="#1F7A6D" stroke-width="3" stroke-linecap="round"/>
      <rect x="64" y="54" width="42" height="24" rx="6" fill="#F1C376"/>
      <text x="85" y="72" text-anchor="middle" fill="#0B1720" font-size="12" font-weight="700">PNG</text>
    </g>

    <rect x="976" y="150" width="190" height="216" rx="22" fill="url(#dark)"/>
    <text x="1071" y="190" text-anchor="middle" fill="#F8FCF8" font-size="21" font-weight="700">矢量导出</text>
    <text x="1071" y="218" text-anchor="middle" fill="#FFE2A6" font-size="15">原始页面嵌入</text>
    <g transform="translate(1016 248)">
      <rect x="0" y="0" width="110" height="88" rx="10" fill="#F8FCF8"/>
      <path d="M18 24H92M18 44H92M18 64H58" stroke="#1F7A6D" stroke-width="3" stroke-linecap="round"/>
      <rect x="60" y="56" width="54" height="36" rx="8" fill="#F1C376"/>
      <text x="87" y="80" text-anchor="middle" fill="#0B1720" font-size="15" font-weight="700">PDF</text>
    </g>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#49605A">
    <text x="151" y="412" text-anchor="middle">源图纸集</text>
    <text x="381" y="412" text-anchor="middle">快速布局搜索</text>
    <text x="611" y="412" text-anchor="middle">不要硬猜标号</text>
    <text x="841" y="412" text-anchor="middle">人工可检查结果</text>
    <text x="1071" y="412" text-anchor="middle">清晰的最终PDF</text>
  </g>
</svg>
